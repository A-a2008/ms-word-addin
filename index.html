<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Abacus AI Copilot</title>
    <!-- Keeps Word connected to the sidebar window -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; margin: 0; background: #f9f9f9; }
        .chat-box { height: 75vh; border: 1px solid #ddd; background: #fff; padding: 10px; overflow-y: auto; border-radius: 6px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .input-area { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 14px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .user { color: #0078d4; margin-bottom: 10px; }
        .bot { color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>Abacus.AI Assistant</h3>
    <div class="chat-box" id="chatBox">Hello! Ask me anything...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your prompt here..." onkeydown="if(event.key === 'Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // 1. YOUR API KEY & THE EXACT BASE ENDPOINT YOU REQUESTED
        const API_KEY = "s2_c2f10742455f4a21a093e3b8dfe6fd38"; 
        const ENDPOINT = "https://api.abacus.ai/api/v0"; // Standard OpenAI format path on Abacus v0

        Office.onReady();

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = inputEl.value.trim();
            if (!text) return;

            // Display user message
            chatBox.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;
            inputEl.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 2. STANDARD OPENAI-STYLE CHAT REQUEST
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "abacus-standard", // Default universal routing model text
                        messages: [
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                
                // Read the standard completions response structure
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const botReply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="bot"><b>Abacus:</b> ${botReply}</div>`;
                } else {
                    chatBox.innerHTML += `<div style="color:red;"><b>Error:</b> Unexpected response structure from API.</div>`;
                }
                
            } catch (err) {
                chatBox.innerHTML += `<div style="color:red;"><b>Connection Error:</b> ${err.message}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
