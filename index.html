<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Abacus AI Copilot</title>
    <!-- Keeps Word connected to the sidebar window -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; margin: 0; background: #f9f9f9; }
        .chat-box { height: 75vh; border: 1px solid #ddd; background: #fff; padding: 10px; overflow-y: auto; border-radius: 6px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .input-area { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 14px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .user { color: #0078d4; margin-bottom: 10px; }
        .bot { color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>Abacus.AI Assistant</h3>
    <div class="chat-box" id="chatBox">Hello! Ask me anything...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your prompt here..." onkeydown="if(event.key === 'Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Paste your standard Abacus API Key here
        const API_KEY = "YOUR_ABACUS_API_KEY"; 
        
        // This is the direct RouteLLM universal endpoint provided by Abacus
        const ENDPOINT = "https://routellm.abacus.ai/v1/chat/completions"; 

        Office.onReady();

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = inputEl.value.trim();
            if (!text) return;

            // Show user text in the UI immediately
            chatBox.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;
            inputEl.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "route-llm", // The universal default model handler
                        messages: [
                            { role: "user", content: text }
                        ]
                    })
                });

                // Read response text directly if JSON parsing fails to avoid token errors
                const rawText = await response.text();
                
                try {
                    const data = JSON.parse(rawText);
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        const botReply = data.choices[0].message.content;
                        chatBox.innerHTML += `<div class="bot"><b>Abacus:</b> ${botReply}</div>`;
                    } else if (data.error) {
                        chatBox.innerHTML += `<div style="color:red;"><b>Abacus Error:</b> ${data.error.message || data.error}</div>`;
                    } else {
                        chatBox.innerHTML += `<div style="color:red;"><b>Error:</b> Structure unrecognized.</div>`;
                    }
                } catch(e) {
                    // If it still returns HTML or an unparseable format, print it out directly to see why
                    chatBox.innerHTML += `<div style="color:red;"><b>Raw Response Error:</b> ${rawText.substring(0, 150)}...</div>`;
                }
                
            } catch (err) {
                chatBox.innerHTML += `<div style="color:red;"><b>Connection Error:</b> ${err.message}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
